<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff — EMS</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="main-content">
            <nav class="navbar">
                <div class="navbar-left">
                    <button class="btn-menu-toggle" id="menuToggle">☰</button>
                    <div class="navbar-title">Staff Management</div>
                </div>
                <div class="navbar-right">
                    <button class="btn btn-primary" onclick="openModal()">+ Add Staff</button>
                </div>
            </nav>

            <div class="page-content">
                <div class="toolbar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search staff…"
                            oninput="filterTable()" />
                    </div>
                    <select class="form-control" id="deptFilter" style="max-width:200px;" onchange="filterTable()">
                        <option value="">All Departments</option>
                    </select>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Department</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="staffTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Add Staff</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form onsubmit="saveUser(event)">
                <input type="hidden" id="userId" />
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name *</label><input type="text"
                            id="userName" class="form-control" required /></div>
                    <div class="form-group"><label class="form-label">Username *</label><input type="text"
                            id="userUsername" class="form-control" required /></div>
                </div>
                <div class="form-group"><label class="form-label">Email *</label><input type="email" id="userEmail"
                        class="form-control" required /></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Password <span id="pwHint"
                                style="color:var(--text-muted);font-weight:400;">(required)</span></label><input
                            type="password" id="userPassword" class="form-control" /></div>
                    <div class="form-group"><label class="form-label">Department</label><select id="userDept"
                            class="form-control">
                            <option value="">— None —</option>
                        </select></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Staff</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
        let allStaff = [], allDepts = [];
        function fmt(d) { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); }

        (async () => {
            const user = await Auth.requireAuth(['admin']);
            if (!user) return;
            Sidebar.render(user, 'staff');

            const [sRes, dRes] = await Promise.all([API.getUsers('role=staff'), API.getDepartments()]);
            allStaff = sRes.data || [];
            allDepts = dRes.data || [];

            allDepts.forEach(d => {
                ['deptFilter', 'userDept'].forEach(id => {
                    const opt = document.createElement('option');
                    opt.value = d.id; opt.textContent = d.department_name;
                    document.getElementById(id).appendChild(opt);
                });
            });

            renderTable(allStaff);
        })();

        function renderTable(data) {
            const tb = document.getElementById('staffTable');
            if (!data.length) { tb.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👩‍🏫</div>No staff found</div></td></tr>'; return; }
            tb.innerHTML = data.map(u => `<tr>
    <td><div style="display:flex;align-items:center;gap:10px;">
      <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">${u.name[0]}</div>
      <div class="td-name">${u.name}</div>
    </div></td>
    <td style="color:var(--text-muted);">@${u.username}</td>
    <td style="color:var(--text-muted);">${u.email}</td>
    <td>${u.department_name || '<span style="color:var(--text-muted)">—</span>'}</td>
    <td>${fmt(u.created_at)}</td>
    <td><div class="td-actions">
      <button class="btn btn-secondary btn-sm btn-icon" onclick="editUser('${u.id}')" title="Edit">✏️</button>
      <button class="btn btn-danger btn-sm btn-icon" onclick="deleteUser('${u.id}')" title="Delete">🗑️</button>
    </div></td>
  </tr>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const d = document.getElementById('deptFilter').value;
            renderTable(allStaff.filter(u =>
                (!q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) &&
                (!d || u.department_id == d)
            ));
        }

        function openModal(reset = true) {
            if (reset) {
                document.getElementById('modalTitle').textContent = 'Add Staff';
                document.getElementById('userId').value = '';
                ['userName', 'userUsername', 'userEmail', 'userPassword'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('userDept').value = '';
                document.getElementById('pwHint').textContent = '(required)';
            }
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function editUser(id) {
            const u = allStaff.find(x => x.id == id); if (!u) return;
            document.getElementById('modalTitle').textContent = 'Edit Staff';
            document.getElementById('userId').value = u.id;
            document.getElementById('userName').value = u.name;
            document.getElementById('userUsername').value = u.username;
            document.getElementById('userEmail').value = u.email;
            document.getElementById('userPassword').value = '';
            document.getElementById('userDept').value = u.department_id || '';
            document.getElementById('pwHint').textContent = '(leave blank to keep)';
            openModal(false);
        }

        async function saveUser(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<span class="loading-spinner"></span>'; btn.disabled = true;
            const id = document.getElementById('userId').value;
            const body = {
                name: document.getElementById('userName').value,
                username: document.getElementById('userUsername').value,
                email: document.getElementById('userEmail').value,
                password: document.getElementById('userPassword').value,
                role: 'staff',
                department_id: document.getElementById('userDept').value || null,
            };
            if (id) body.id = id;
            const res = id ? await API.updateUser(body) : await API.createUser(body);
            if (res.success) {
                Toast.success(res.message); closeModal();
                const fresh = await API.getUsers('role=staff');
                allStaff = fresh.data || []; renderTable(allStaff);
            } else Toast.error(res.message);
            btn.innerHTML = 'Save Staff'; btn.disabled = false;
        }

        async function deleteUser(id) {
            if (!confirm('Remove this staff member?')) return;
            const res = await API.deleteUser(id);
            if (res.success) {
                Toast.success('Staff removed.');
                allStaff = allStaff.filter(u => u.id != id); renderTable(allStaff);
            } else Toast.error(res.message);
        }
    </script>
</body>

</html>
